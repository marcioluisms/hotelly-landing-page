    <!-- Delayed Third-Party Scripts (Analytics & Tracking) -->
    <script>
      function injectThirdPartyScripts() {
        // Only run once
        if (window._scriptsInjected) return;
        window._scriptsInjected = true;

        // 1. Google Tag Manager (GTAG)
        var gtagScript = document.createElement('script');
        gtagScript.async = true;
        gtagScript.src = "https://www.googletagmanager.com/gtag/js?id=G-SV7EVFBEDZ";
        document.head.appendChild(gtagScript);

        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-SV7EVFBEDZ');

        // 2. Microsoft Clarity
        var clarityStr = "(function(c,l,a,r,i,t,y){c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};t=l.createElement(r);t.async=1;t.src='https://www.clarity.ms/tag/'+i+'?ref=bwt';y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);})(window, document, 'clarity', 'script', 'w0vlst74ni');";
        var clarityScript = document.createElement('script');
        clarityScript.type = "text/javascript";
        clarityScript.innerHTML = clarityStr;
        document.head.appendChild(clarityScript);
      }

      function scheduleInjection() {
        if ('requestIdleCallback' in window) {
          requestIdleCallback(function() {
            setTimeout(injectThirdPartyScripts, 4000);
          });
        } else {
          setTimeout(injectThirdPartyScripts, 4000);
        }
      }

      if (document.readyState === 'complete') {
        scheduleInjection();
      } else {
        window.addEventListener('load', scheduleInjection);
      }
    </script>
